<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Board</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#222;
    }

    .board{
        width:480px;
        height:480px;
        display:grid;
        grid-template-columns:repeat(8,1fr);
        border:5px solid #7b5757;
    }

    .white{
        background:#0a0a0a;
    }

    .black{
        background:#fcfcfb;
    }
</style>
</head>

    <div class="black"></div>

    <div class="black"></div>

    <div class="black"></div>
    <div class="white"></div>
    <div class="black"></div>

    <div class="black"></div>
    <div class="white"></div>
    <div class="black"></div>
    <div class="white"></div>
    <div class="black"></div>
